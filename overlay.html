<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轉播疊加畫面 (向量超清 + 三層結構版)</title>
    <style>
        /* 基礎透明背景與字型 */
        body { 
            margin: 0; padding: 0; overflow: hidden; background-color: transparent; 
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif; font-weight: bold; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        
        /* 容器 */
        #scale-wrapper { position: absolute; top: 0; left: 0; transform-origin: top left; padding: 20px; display: none;} /* 新增 display: none 等待登入 */

        .scoreboard { width: 460px; display: flex; flex-direction: column; border-radius: 8px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: 1px solid #aaa; }
        
        /* ========================================== */
        /* 1. 最上方區塊：投手資訊列 */
        /* ========================================== */
        .pitcher-row-overlay { background-color: #101451; color: white; height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid white; }
        .pitcher-info-overlay { display: flex; gap: 15px; align-items: center; }
        .pitcher-label-overlay { background-color: #FFFF00; color: #000; font-size: 22px; font-weight: 900; padding: 0px 8px; border-radius: 4px; }
        .pitcher-name-overlay { font-size: 28px; letter-spacing: 1px; }
        .pitch-stats-group { display: flex; align-items: center; gap: 20px; margin-right: 10px; }
        .speed-overlay { display: none; align-items: baseline; gap: 5px; background-color: rgba(0, 0, 0, 0.4); padding: 2px 10px; border-radius: 4px; border: 1px solid #FFFF00; }
        .radar-speed { font-size: 32px; color: #FFFF00; font-style: italic; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .radar-unit { font-size: 16px; color: #fff; font-style: italic; }
        .pitch-count-group { display: flex; align-items: center; gap: 10px; }
        .baseball-icon { width: 26px; height: 26px; fill: white; opacity: 0.9; }
        .pitch-count-num-overlay { font-size: 36px; color: #FFFF00; font-style: italic; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); width: 65px; text-align: right; }

        /* ========================================== */
        /* 2. 中間區塊：BSO 核心資訊 */
        /* ========================================== */
        .title-row { background-color: #101451; color: white; justify-content: center; font-size: 32px; height: 50px; display: flex; align-items: center; letter-spacing: 2px; }
        .main-grid { display: grid; grid-template-columns: 1fr 140px; grid-template-rows: 70px 70px; border-top: 2px solid white; border-bottom: 2px solid white; }
        
        .team-row { display: flex; align-items: center; color: white; font-size: 32px; letter-spacing: 2px; padding-left: 20px; }
        .team-away { grid-column: 1; grid-row: 1; background-color: #009EDB; border-bottom: 1px solid rgba(255,255,255,0.3); }
        .team-home { grid-column: 1; grid-row: 2; background-color: #62338A; }
        .team-name { flex-grow: 1; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 15px; }
        .team-score { font-size: 54px; text-align: right; margin-right: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        .inning-bases-area { grid-column: 2; grid-row: 1 / span 2; background-color: #7B006C; display: flex; flex-direction: column; justify-content: center; align-items: center; border-left: 2px solid white; }
        .bases-container { position: relative; width: 80px; height: 80px; margin-bottom: 10px; }
        .base-diamond { position: absolute; width: 30px; height: 30px; background: white; transform: rotate(45deg); transition: background-color 0.2s; }
        .base-diamond.active { background-color: #00FF00; } 
        #base-2 { top: 12px; left: 25px; } #base-3 { top: 37px; left: 0; } #base-1 { top: 37px; left: 50px; }    

        .inning-box { display: flex; align-items: center; gap: 5px; font-size: 38px; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .inning-arrow { color: #FFFF00; font-size: 32px; }

        .count-row { background-color: #101451; color: white; display: flex; justify-content: space-around; align-items: center; height: 50px; font-size: 28px; padding: 0 10px; }
        .count-group { display: flex; gap: 8px; align-items: center; }
        .count-label { width: 30px; text-align: right; margin-right: 5px; }
        .dot { width: 20px; height: 20px; border-radius: 50%; background: #FFFFFF; }
        .dot.b-active { background: #00FF00; } .dot.s-active { background: #FFFF00; } .dot.o-active { background: #FF0000; }
        .separator { width: 2px; height: 30px; background-color: rgba(255,255,255,0.5); }

        /* ========================================== */
        /* 3. 最下方區塊：打者資訊列 */
        /* ========================================== */
        .player-row { background-color: #EEEEEE; color: #333; height: 55px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-top: 2px solid white; }
        .player-info { display: flex; gap: 15px; align-items: baseline; }
        .player-number { font-size: 36px; color: #000; }
        .player-name { font-size: 28px; color: #000; }
        .batter-stats-group { display: flex; align-items: center; gap: 15px; }
        .player-stats { font-size: 26px; font-weight: 900; color: #d35400; font-family: Arial, sans-serif; }
        
        .bat-icon { width: 36px; height: 36px; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3)); }
        
        /* 登入介面樣式 */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(16, 20, 81, 0.95); z-index: 10000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        .login-box {
            background: white; padding: 30px; border-radius: 10px; color: black; width: 300px; text-align: center;
        }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 10px; background: #101451; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>

<body>

<!-- 登入層 -->
<div id="login-overlay">
    <div class="login-box">
        <h2 style="margin-top:0">Overlay 系統登入</h2>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-pw" placeholder="Password">
        <button id="login-btn">確認登入</button>
        <p id="login-msg" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div id="scale-wrapper">
    <div class="scoreboard">
        
        <div class="pitcher-row-overlay" id="pitcher-container">
            <div class="pitcher-info-overlay"><span class="pitcher-label-overlay">P</span><span class="pitcher-name-overlay" id="overlay-pitcher-name">--</span></div>
            <div class="pitch-stats-group">
                <div class="speed-overlay" id="radar-container"><span class="radar-speed" id="radar-speed">155</span><span class="radar-unit">km/h</span></div>
                <div class="pitch-count-group">
                    <svg class="baseball-icon" viewBox="0 0 512 512"><path d="M256 0C114.6 0 0 114.6 0 256s114.6 256 256 256 256-114.6 256-256S397.4 0 256 0zM124.5 98.4c29.1 39.5 44.5 89.2 41 140.6-3.8 55.4-30.8 106.8-74 138.8-17-29.8-27.5-64.2-27.5-100.8 0-66.2 25.5-126.5 60.5-178.6zm263 0c35 52.1 60.5 112.4 60.5 178.6 0 36.6-10.5 71-27.5 100.8-43.2-32-70.2-83.4-74-138.8-3.5-51.4 11.9-101.1 41-140.6z"/></svg>
                    <span class="pitch-count-num-overlay" id="overlay-pitch-count">0</span>
                </div>
            </div>
        </div>

        <div class="title-row" id="game-title">等待賽事資料...</div>
        <div class="main-grid">
            <div class="team-row team-away"><div class="team-name" id="away-name">客隊</div><div class="team-score" id="away-score">0</div></div>
            <div class="team-row team-home"><div class="team-name" id="home-name">主隊</div><div class="team-score" id="home-score">0</div></div>
            <div class="inning-bases-area">
                <div class="bases-container"><div class="base-diamond" id="base-2"></div><div class="base-diamond" id="base-3"></div><div class="base-diamond" id="base-1"></div></div>
                <div class="inning-box"><span class="inning-arrow" id="inning-half">▲</span><span id="inning-num">1</span></div>
            </div>
        </div>
        <div class="count-row">
            <div class="count-group"><span class="count-label">B</span><div class="dot" id="b1"></div><div class="dot" id="b2"></div><div class="dot" id="b3"></div></div>
            <div class="separator"></div>
            <div class="count-group"><span class="count-label">S</span><div class="dot" id="s1"></div><div class="dot" id="s2"></div></div>
            <div class="separator"></div>
            <div class="count-group"><span class="count-label">O</span><div class="dot" id="o1"></div><div class="dot" id="o2"></div></div>
        </div>
        
        <div class="player-row" id="player-container" style="display: none;">
            <div class="player-info"><div class="player-number" id="player-number">--</div><div class="player-name" id="player-name">--</div></div>
            <div class="batter-stats-group">
                <div class="player-stats" id="player-stats">0 / 0</div>
                
                <svg class="bat-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <g transform="translate(50, 50) rotate(-45) translate(-50, -50)">
                        <path d="M 6,54 
                                 C 2,54 2,46 6,46 
                                 L 8,48 
                                 L 45,48 
                                 C 65,48 72,45 82,45 
                                 L 94,45 
                                 C 99,45 99,55 94,55 
                                 L 82,55 
                                 C 72,55 65,52 45,52 
                                 L 8,52 
                                 Z" 
                              fill="#333333" />
                    </g>
                </svg>
                
            </div>
        </div>
    </div>
</div>

<!-- 移除多餘的隱藏 div 以免干擾 DOM -->

<script type="module">

// 修改匯入邏輯以支援 auth 與 auth 狀態監聽
import { db, auth } from "./firebase.js";
import { ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// ===== 登入邏輯 =====
document.getElementById('login-btn').addEventListener('click', async () => {
    const e = document.getElementById('login-email').value;
    const p = document.getElementById('login-pw').value;
    const msg = document.getElementById('login-msg');
    try {
        await signInWithEmailAndPassword(auth, e, p);
    } catch(err) { msg.innerText = "驗證失敗：" + err.message; }
});

// ===== 監聽登入狀態 =====
onAuthStateChanged(auth, (user) => {
    if(user) {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('scale-wrapper').style.display = 'block';
        startFirebaseSync();
    } else {
        document.getElementById('login-overlay').style.display = 'flex';
        document.getElementById('scale-wrapper').style.display = 'none';
    }
});

// ===== Firebase 讀取邏輯 =====
function startFirebaseSync() {
    const gameId = new URLSearchParams(location.search).get("gameId");

    if (!gameId) {
        document.getElementById("game-title").innerText = "❌ 缺少 gameId";
        return;
    }

    const basePath = `games/${gameId}`;
    console.log("✅ overlay gameId:", gameId);

    // ===== 監聽 =====
    onValue(ref(db, basePath), (snap) => {

        const data = snap.val();
        if (!data) return;

        document.getElementById('game-title').innerText = data.title || '';

        document.getElementById('away-name').innerText = data.teams?.away?.name || '客隊';
        document.getElementById('away-score').innerText = data.teams?.away?.score || 0;
        document.getElementById('home-name').innerText = data.teams?.home?.name || '主隊';
        document.getElementById('home-score').innerText = data.teams?.home?.score || 0;

        const isTop = data.gameInfo?.isTop ?? true;
        document.getElementById('inning-num').innerText = data.gameInfo?.inning || 1;
        document.getElementById('inning-half').innerText = isTop ? '▲' : '▼';

        document.getElementById('base-1').classList.toggle("active", data.bases?.first);
        document.getElementById('base-2').classList.toggle("active", data.bases?.second);
        document.getElementById('base-3').classList.toggle("active", data.bases?.third);

        for(let i=1;i<=3;i++){
            document.getElementById(`b${i}`).className =
                `dot ${data.count?.balls >= i ? 'b-active' : ''}`;
        }
        for(let i=1;i<=2;i++){
            document.getElementById(`s${i}`).className =
                `dot ${data.count?.strikes >= i ? 's-active' : ''}`;
        }
        for(let i=1;i<=2;i++){
            document.getElementById(`o${i}`).className =
                `dot ${data.count?.outs >= i ? 'o-active' : ''}`;
        }
        
        // 投手用球數與姓名
        const pitchingTeam = isTop ? 'home' : 'away';
        const pc = data.pitchCount?.[pitchingTeam] || 0;
        document.getElementById('overlay-pitch-count').innerText = pc;
        
        const pIdx = data.lineups?.[pitchingTeam]?.pitcherIndex;
        if(pIdx !== undefined && pIdx !== -1 && data.rosters?.[pitchingTeam]?.[pIdx]) {
            document.getElementById('overlay-pitcher-name').innerText = data.rosters[pitchingTeam][pIdx].name || '--';
        } else {
            document.getElementById('overlay-pitcher-name').innerText = '--';
        }

        // 打者資訊
        const cb = data.currentBatter;
        const playerContainer = document.getElementById('player-container');
        if(cb && cb.rosterIndex !== -1 && data.rosters?.[cb.team]?.[cb.rosterIndex]) {
            const player = data.rosters[cb.team][cb.rosterIndex];
            playerContainer.style.display = 'flex';
            document.getElementById('player-number').innerText = player.num || '00';
            document.getElementById('player-name').innerText = player.name || '--';
            document.getElementById('player-stats').innerText = `${player.H || 0} / ${player.AB || 0}`;
        } else {
            playerContainer.style.display = 'none';
        }
        // ===================================
        // 新增：球速 (Radar) 顯示與自動消失邏輯
        // ===================================
        const radarContainer = document.getElementById('radar-container');
        const radarSpeedEl = document.getElementById('radar-speed');
        
        if (data.radar && data.radar.speed && data.radar.speed > 0) {
            radarSpeedEl.innerText = data.radar.speed;
            radarContainer.style.display = 'flex'; // 顯示球速
            
            // 如果之前已經有計時器在跑，先把它清除掉，避免連續輸入時提早消失
            if (window.radarTimeout) {
                clearTimeout(window.radarTimeout);
            }
            
            // 設定 6000 毫秒 (6秒) 後自動隱藏
            window.radarTimeout = setTimeout(() => {
                radarContainer.style.display = 'none';
                
                // 【重要功能】：自動把 Firebase 中的球速歸零
                // 這樣即使投手連續兩球投出相同的球速 (例如 150 -> 150)，
                // 系統也能感知到數值變化而重新觸發顯示動畫。
                update(ref(db, basePath + '/radar'), { speed: 0 });
                
            }, 6000);
            
        } else {
            radarContainer.style.display = 'none'; // 如果發送 0，立即隱藏
        }
        // ===================================
    });
}

// ===== 縮放（安全版）=====
function applyScale() {
    const wrapper = document.getElementById('scale-wrapper');
    const board = document.querySelector('.scoreboard');

    if (!wrapper || !board) return;

    const scale = Math.min(
        window.innerWidth / 500,
        window.innerHeight / (board.offsetHeight + 40)
    );

    wrapper.style.zoom = scale;
}

window.addEventListener('resize', applyScale);
setInterval(applyScale, 500);

</script>

</body>
</html>
