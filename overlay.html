<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>BSO 疊加畫面 - 專業轉播版</title>
    <style>
        /* 基礎透明與向量縮放設定 */
        body { margin: 0; padding: 0; background-color: transparent; overflow: hidden; font-family: sans-serif; font-weight: bold; }
        #scale-wrapper { position: absolute; top: 0; left: 0; transform-origin: top left; padding: 20px; }

        /* 記分板主體 */
        .scoreboard { width: 480px; background: rgba(16, 20, 81, 0.95); color: white; border: 2px solid #fff; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; }
        
        .main-row { display: flex; height: 70px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .team-box { flex: 1; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-right: 1px solid rgba(255,255,255,0.2); }
        .score { font-size: 32px; color: #f1c40f; }
        .inning-box { width: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); }

        /* BSO 燈號區 */
        .status-row { display: flex; padding: 10px 15px; align-items: center; justify-content: space-between; background: #000; }
        .bso-container { display: flex; gap: 15px; }
        .bso-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 15px; height: 15px; border-radius: 50%; background: #333; border: 1px solid #666; }
        
        /* 燈號顏色 */
        .dot.active-B { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        .dot.active-S { background: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
        .dot.active-O { background: #e74c3c; box-shadow: 0 0 10px #e74c3c; }

        /* 壘包圖案 */
        .bases { position: relative; width: 40px; height: 40px; transform: rotate(45deg); margin-right: 10px; }
        .base { position: absolute; width: 14px; height: 14px; border: 2px solid #fff; }
        .base.active { background: #f1c40f; }
        #base1 { top: 0; right: 0; } #base2 { top: 0; left: 0; } #base3 { bottom: 0; left: 0; }
    </style>
</head>
<body>

<div id="scale-wrapper">
    <div class="scoreboard">
        <div class="main-row">
            <div class="team-box">
                <span id="away-name">客隊</span>
                <span id="away-score" class="score">0</span>
            </div>
            <div class="inning-box">
                <span id="inning-half" style="font-size: 14px; color: #e74c3c;">▲</span>
                <span id="inning-num" style="font-size: 24px;">1</span>
            </div>
            <div class="team-box" style="border-right: none;">
                <span id="home-score" class="score">0</span>
                <span id="home-name">主隊</span>
            </div>
        </div>

        <div class="status-row">
            <div class="bso-container">
                <div class="bso-item"><span>B</span><div id="b-dots" style="display:flex;gap:5px;"></div></div>
                <div class="bso-item"><span>S</span><div id="s-dots" style="display:flex;gap:5px;"></div></div>
                <div class="bso-item"><span>O</span><div id="o-dots" style="display:flex;gap:5px;"></div></div>
            </div>
            <div class="bases">
                <div id="base2" class="base"></div>
                <div id="base1" class="base"></div>
                <div id="base3" class="base"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 1. Firebase 配置 (請在此填入您的真實金鑰)
  const firebaseConfig = {
  apiKey: "AIzaSyBDc712j6cY3VoL2YxvTk8rnwqDfcr28UA",
  authDomain: "baseball-scoreboard-294d8.firebaseapp.com",
  databaseURL: "https://baseball-scoreboard-294d8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "baseball-scoreboard-294d8",
  storageBucket: "baseball-scoreboard-294d8.firebasestorage.app",
  messagingSenderId: "179359096477",
  appId: "1:179359096477:web:8188f897371651442e7e74"
  };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const urlParams = new URLSearchParams(window.location.search);
    const gameId = urlParams.get('gameId');

    if (gameId) {
        onValue(ref(db, `games/${gameId}`), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // 更新 UI
            document.getElementById('away-name').innerText = data.teams.away.name;
            document.getElementById('home-name').innerText = data.teams.home.name;
            document.getElementById('away-score').innerText = data.teams.away.score;
            document.getElementById('home-score').innerText = data.teams.home.score;
            document.getElementById('inning-num').innerText = data.gameInfo.inning;
            document.getElementById('inning-half').innerText = data.gameInfo.isTop ? "▲" : "▼";

            // BSO 燈號渲染
            renderDots('b-dots', data.count.balls, 3, 'active-B');
            renderDots('s-dots', data.count.strikes, 2, 'active-S');
            renderDots('o-dots', data.count.outs, 2, 'active-O');

            // 壘包渲染
            document.getElementById('base1').className = data.bases.first ? 'base active' : 'base';
            document.getElementById('base2').className = data.bases.second ? 'base active' : 'base';
            document.getElementById('base3').className = data.bases.third ? 'base active' : 'base';
        });
    }

    function renderDots(id, count, max, activeClass) {
        let html = '';
        for (let i = 0; i < max; i++) {
            html += `<div class="dot ${i < count ? activeClass : ''}"></div>`;
        }
        document.getElementById(id).innerHTML = html;
    }
</script>
</body>
</html>
