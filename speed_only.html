<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Only Speed</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
        /* ⭐ 關鍵 */
    display: flex;
    justify-content: flex-end;
    align-items: flex-end;
}

/* 🔥 外框（避免裁切版） */
#container {

    /* ❌ 不要吃滿整個畫面 */
    /* width: 100%; */
    /* height: 100%; */

    display: inline-flex;

    align-items: flex-end;
    justify-content: flex-end;

    box-sizing: border-box;

    /* ⭐ 四邊一致 */
    padding: 8px 10px;

    background: #000;
    border: 1px solid #FFD700;
}

/* 🔥 內容（右下角） */
#speed-wrapper {
    display: flex;
    align-items: flex-end;
}

/* 🔥 數字 */
#speed {
    font-size: 15vw;
    font-style: italic;
    font-weight: normal;

    color: #FFD700;

    font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;

    line-height: 0.9;

    /* 🔥 防跳動 */
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";

    min-width: 3.2ch;
    text-align: right;
}

/* 🔥 單位 */
#unit {
    font-size: 9vw;
    font-style: italic;
    color: #ffffff;

    font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;

    margin-left: 1vw;
    margin-bottom: 2vw;
}

/* 🔥 高球速 */
.high-speed #speed {
    color: #ff2d2d;
    transform: scale(1.2);
}

/* 🔥 淡出 */
.fade-in { opacity: 1; transition: 0.2s; }
.fade-out { opacity: 0; transition: 0.6s; }

</style>
</head>

<body>

<div id="container">
    <div id="speed-wrapper">
        <div id="speed">152</div>
        <div id="unit">km/h</div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "baseball-scoreboard-294d8.firebaseapp.com",
  databaseURL: "https://baseball-scoreboard-294d8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "baseball-scoreboard-294d8",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const params = new URLSearchParams(location.search);
const gameId = params.get("gameId");

console.log("🔥 only_speed gameId =", gameId);

let path = gameId
    ? `games/${gameId}/radar/speed`
    : "scoreboard/radar/speed";

// ⭐ fallback（防 OBS 抓不到）
let fallbackPath = "scoreboard/radar/speed";


const container = document.getElementById("container");
const speedEl = document.getElementById("speed");

let isPreviewMode = true;
let hasRealData = false;

setTimeout(() => {
    isPreviewMode = false;
}, 60000);

let hideTimer = null;

function showSpeed(speed) {
    if (!speed || speed === 0) return;

    speedEl.innerText = speed;

    container.classList.remove("fade-out");
    container.classList.add("fade-in");

    if (Number(speed) > 150) {
        container.classList.add("high-speed");
    } else {
        container.classList.remove("high-speed");
    }

    if (hideTimer) clearTimeout(hideTimer);

    hideTimer = setTimeout(() => {
        container.classList.remove("fade-in");
        container.classList.add("fade-out");
    }, 6000);
}

onValue(ref(db, path), (snapshot) => {
    const speed = snapshot.val();

    console.log("speed(main):", speed);

    // ⭐ 有真實資料
    if (speed) {
        hasRealData = true;
        showSpeed(speed);
        return;
    }

    // ⭐ 沒資料 → fallback
    onValue(ref(db, fallbackPath), (snap2) => {
        const fbSpeed = snap2.val();

        console.log("speed(fallback):", fbSpeed);

        if (fbSpeed) {
            hasRealData = true;
            showSpeed(fbSpeed);
            return;
        }

        // ⭐ ⭐ ⭐ 重點：只有在 preview 才顯示假數值
        if (!hasRealData && isPreviewMode) {
            showSpeed(120);  // 👈 可改你要的預設值
        }
    });
});
</script>

</body>
</html>
