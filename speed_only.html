<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>純球速疊加畫面 (極簡無底框巨大化版)</title>
    <style>
        /* 基礎透明背景，強制向量抗鋸齒渲染 */
        body { 
            margin: 0; padding: 0; overflow: hidden; background-color: transparent; 
            font-family: "Arial", "Helvetica", "Microsoft JhengHei", sans-serif; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        
        /* 縮放容器與防裁切邊界 */
        #scale-wrapper { 
            position: absolute; 
            top: 0; 
            left: 0; 
            padding: 20px; 
            width: 450px;    
            height: 250px;   
            display: flex;
            align-items: center;
            justify-content: center;
            transform-origin: top left; 
        }

        /* 球速顯示框 */
        .speed-box {
            background: transparent; /* ✅ 修改 1：將背景設定為全透明，移除深色畫布 */
            /* 🚫 移除了 box-shadow，讓框框的實體陰影消失 */
            padding: 15px 40px; 
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0; 
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .speed-box.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* 預設球速字體 (150含以下) - 保留了文字的陰影確保辨識度 */
        .speed-val {
            color: #FFFF00;
            font-size: 250px; 
            font-weight: bold; 
            font-style: italic;
            line-height: 1; 
            text-shadow: 4px 4px 8px rgba(0,0,0,0.8); /* 數字本身的陰影保留，確保疊加在淺色背景依然清晰 */
            letter-spacing: 2px;
            transition: color 0.2s, -webkit-text-stroke 0.2s; 
        }

        /* 火球特效 (大於 150 km/h 時套用) */
        .speed-val.fire {
            color: #FF1111; 
            -webkit-text-stroke: 0.2px #FFFF00; 
            text-shadow: 0 0 35px rgba(255, 0, 0, 0.8), 8px 8px 15px rgba(0,0,0,0.8); 
        }
    </style>
</head>
<body>

<div id="scale-wrapper">
    <div class="speed-box active" id="speed-container">
        <span class="speed-val fire" id="speed-text">155</span>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  // TODO: 貼上您的 Firebase Config
  const firebaseConfig = {
  apiKey: "AIzaSyBDc712j6cY3VoL2YxvTk8rnwqDfcr28UA",
  authDomain: "baseball-scoreboard-294d8.firebaseapp.com",
  databaseURL: "https://baseball-scoreboard-294d8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "baseball-scoreboard-294d8",
  storageBucket: "baseball-scoreboard-294d8.firebasestorage.app",
  messagingSenderId: "179359096477",
  appId: "1:179359096477:web:8188f897371651442e7e74"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const urlParams = new URLSearchParams(window.location.search);
  const gameId = urlParams.get('gameId');
  const basePath = gameId ? `games/${gameId}/radar` : 'scoreboard/radar';

  let currentSpeed = "";

  // 載入預覽機制：給導播 8 秒鐘的時間調整位置，時間到自動隱藏防呆
  let hideTimeout = setTimeout(() => {
      document.getElementById('speed-container').classList.remove('active');
      document.getElementById('speed-text').innerText = "--";
      document.getElementById('speed-text').classList.remove('fire');
  }, 20000);

  // 監聽 Firebase 上的球速節點
  onValue(ref(db, basePath), (snapshot) => {
      const radarData = snapshot.val();
      if (!radarData) return;

      const speedBox = document.getElementById('speed-container');
      const speedText = document.getElementById('speed-text');
      
      const offset = radarData.offset ? parseInt(radarData.offset) : 0;

      if (radarData.speed && radarData.speed !== "") {
          if (radarData.speed !== currentSpeed) {
              currentSpeed = radarData.speed;
              
              let rawSpeed = parseInt(radarData.speed);
              let finalSpeedText = radarData.speed; 
              let finalSpeedNum = 0;
              
              if (!isNaN(rawSpeed)) {
                  finalSpeedNum = rawSpeed + offset;
                  finalSpeedText = finalSpeedNum.toString();
              }
              
              // 更新數字
              speedText.innerText = finalSpeedText;
              
              // 判斷球速是否大於 150，動態加入火球特效 Class
              if (finalSpeedNum > 150) {
                  speedText.classList.add('fire');
              } else {
                  speedText.classList.remove('fire');
              }
              
              // 顯示動畫
              speedBox.classList.add('active');
              
              if (hideTimeout) clearTimeout(hideTimeout);
              
              hideTimeout = setTimeout(() => {
                  speedBox.classList.remove('active');
                  currentSpeed = ""; 
                  update(ref(db, basePath), { speed: "" });
              }, 3000);
          }
      }
  });

  function applyScale() {
      const wrapper = document.getElementById('scale-wrapper');
      
      const designW = 450; 
      const designH = 250; 
      const paddingOffset = 40; 
      
      const targetW = designW + paddingOffset;
      const targetH = designH + paddingOffset; 
      
      const winW = window.innerWidth;
      const winH = window.innerHeight;
      
      const scale = Math.min(winW / targetW, winH / targetH);
      
      wrapper.style.transform = 'none';
      wrapper.style.zoom = scale;
      
      const xOffset = (winW - targetW * scale) / 2;
      const yOffset = (winH - targetH * scale) / 2;
      
      wrapper.style.left = `${Math.max(0, xOffset)}px`;
      wrapper.style.top = `${Math.max(0, yOffset)}px`;
  }
  
  window.addEventListener('resize', applyScale);
  applyScale();
  setInterval(applyScale, 500);
</script>
</body>
</html>
