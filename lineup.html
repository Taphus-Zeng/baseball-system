<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>先發守備陣容疊加畫面 (淺色透視與完美邊界版)</title>
    <style>
        /* ✅ 1. 基礎背景設定
           這裡將 body 背景改為淺色 (白色)，並設定 rgba 的透明度。
           0.8 代表 80% 的不透明度。如果您覺得太白遮住太多直播畫面，可以將 0.8 改為 0.5 或 0.2 來增加透視感！ */
        body { margin: 0; padding: 0; overflow: hidden; background-color: rgba(255, 255, 255, 0.8); font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif; }
        
        /* 鎖定長寬比的虛擬畫布，所有元素都在這張 1280x720 的畫布上作畫 */
        #scale-wrapper { position: absolute; top: 0; left: 0; width: 1280px; height: 720px; transform-origin: top left; }

        /* 移除原本的深色遮罩，改為純粹的排版容器 */
        .overlay-container { width: 100%; height: 100%; position: relative; display: flex; flex-direction: column; align-items: center; }
        
        /* 頂部標題列 (維持白字配黑陰影，在淺色背景上依然能清晰跳出) */
        .title-banner { margin-top: 40px; background: linear-gradient(90deg, transparent, rgba(0, 158, 219, 0.8), transparent); width: 80%; text-align: center; padding: 15px 0; color: white; font-size: 42px; font-weight: bold; letter-spacing: 5px; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); opacity: 0; animation: fadeInDown 1s ease-out 0.2s forwards; z-index: 20; }

        /* 球場底圖容器 */
        .field-container { position: relative; width: 900px; height: 600px; margin-top: 20px; }
        
        /* 讀取您上傳的專屬球場圖片 */
        .field-bg { width: 100%; height: 100%; object-fit: contain; opacity: 0; filter: drop-shadow(0 0 15px rgba(0, 200, 255, 0.6)); animation: fadeIn 1.5s ease-out 0.5s forwards; }

        /* ====== 守備位置座標 (稍微往內收縮，避免名字太長溢出) ====== */
        .pos-wrapper { position: absolute; transform: translate(-50%, -50%); z-index: 10; }
        
        #wrap-C  { top: 88%; left: 50%; }
        #wrap-P  { top: 62%; left: 50%; }
        #wrap-1B { top: 58%; left: 72%; }
        #wrap-2B { top: 42%; left: 62%; }
        #wrap-3B { top: 58%; left: 28%; }
        #wrap-SS { top: 42%; left: 38%; }
        #wrap-LF { top: 22%; left: 25%; }
        #wrap-CF { top: 12%; left: 50%; }
        #wrap-RF { top: 22%; left: 75%; }
        
        /* DH 指定打擊：放置在右下角，微調至 82% 確保安全距離 */
        #wrap-DH { top: 82%; left: 82%; z-index: 15; }

        /* ====== 球員圖塊與動畫設計 ====== */
        .player-card { display: flex; flex-direction: column; align-items: center; opacity: 0; transform: scale(0.5) translateY(30px); }
        
        /* 守位圓形徽章 */
        .pos-badge { background: linear-gradient(135deg, #101451, #009EDB); color: white; width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: bold; border: 2px solid #00FFFF; box-shadow: 0 0 10px rgba(0,200,255,0.8); margin-bottom: -5px; z-index: 2; text-shadow: 1px 1px 2px black; }
        
        /* 圓角平行四邊形 姓名板 */
        .name-plate { 
            background: rgba(0, 0, 0, 0.75); 
            border: 2px solid #00FFFF; 
            border-radius: 8px; 
            transform: skew(-15deg); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 0 10px rgba(0,255,255,0.2); 
            padding: 6px 18px; 
            overflow: hidden;
            position: relative;
        }
        
        /* 反向傾斜，讓文字維持正的 */
        .name-plate-inner { transform: skew(15deg); display: flex; align-items: baseline; gap: 10px; }
        .player-num { color: #FFFF00; font-size: 20px; font-weight: 900; font-style: italic; }
        .player-name { color: #FFFFFF; font-size: 24px; font-weight: bold; white-space: nowrap; text-shadow: 1px 1px 3px black; letter-spacing: 2px; }

        /* ====== 動畫觸發定義 ====== */
        .pos-wrapper.animate-pop .player-card { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; animation-delay: var(--delay); }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; filter: drop-shadow(0 0 0 rgba(0,255,255,0)); } to { opacity: 1; filter: drop-shadow(0 0 20px rgba(0, 200, 255, 0.6)); } }
        @keyframes popIn { 
            0% { opacity: 0; transform: scale(0.5) translateY(30px); } 
            100% { opacity: 1; transform: scale(1) translateY(0); } 
        }
    </style>
</head>
<body>

<div id="scale-wrapper">
    <div class="overlay-container">
        <div class="title-banner" id="team-title">載入陣容中...</div>
        
        <div class="field-container">
            <img src="field.png" class="field-bg" alt="Baseball Field">

            <div class="pos-wrapper" id="wrap-P"  style="--delay: 1.0s;"><div class="player-card"><div class="pos-badge">P</div><div class="name-plate"><div class="name-plate-inner"><span class="player-num" id="num-P"></span><span class="player-name" id="name-P">--</span></div></div></div></div>
            <div class="pos-wrapper" id="wrap-C"  style="--delay: 1.1s;"><div class="player-card"><div class="pos-badge">C</div><div class="name-plate"><div class="name-plate-inner"><span class="player-num" id="num-C"></span><span class="player-name" id="name-C">--</span></div></div></div></div>
            
            <div class="pos-wrapper" id="wrap-1B" style="--delay: 1.3s;"><div class="player-card"><div class="pos-badge">1B</div><div class="name-plate"><div class="name-plate-inner"><span class="player-num" id="num-1B"></span><span class="player-name" id="name-1B">--</span></div></div></div></div>
            <div class="pos-wrapper" id="wrap-2B" style="--delay: 1.4s;"><div class="player-card"><div class="pos-badge">2B</div><div class="name-plate"><div class="name-plate-inner"><span class="player-num" id="num-2B"></span><span class="player-name" id="name-2B">--</span></div></div></div></div>
            <div class="pos-wrapper" id="wrap-3B" style="--delay: 1.5s;"><div class="player-card"><div class="pos-badge">3B</div><div class="name-plate"><div class="name-plate-inner"><span class="player-num" id="num-3B"></span><span class="player-name" id="name-3B">--</span></div></div></div></div>
            <div class="pos-wrapper" id="wrap-SS" style="--delay: 1.6s;"><div class="player-card"><div class="pos-badge">SS</div><div class="name-plate"><div class="name-plate-inner"><span class="player-num" id="num-SS"></span><span class="player-name" id="name-SS">--</span></div></div></div></div>
            
            <div class="pos-wrapper" id="wrap-LF" style="--delay: 1.8s;"><div class="player-card"><div class="pos-badge">LF</div><div class="name-plate"><div class="name-plate-inner"><span class="player-num" id="num-LF"></span><span class="player-name" id="name-LF">--</span></div></div></div></div>
            <div class="pos-wrapper" id="wrap-CF" style="--delay: 1.9s;"><div class="player-card"><div class="pos-badge">CF</div><div class="name-plate"><div class="name-plate-inner"><span class="player-num" id="num-CF"></span><span class="player-name" id="name-CF">--</span></div></div></div></div>
            <div class="pos-wrapper" id="wrap-RF" style="--delay: 2.0s;"><div class="player-card"><div class="pos-badge">RF</div><div class="name-plate"><div class="name-plate-inner"><span class="player-num" id="num-RF"></span><span class="player-name" id="name-RF">--</span></div></div></div></div>
            
            <div class="pos-wrapper" id="wrap-DH" style="--delay: 2.2s;"><div class="player-card"><div class="pos-badge" style="background: linear-gradient(135deg, #b33939, #ff5252);">DH</div><div class="name-plate"><div class="name-plate-inner"><span class="player-num" id="num-DH"></span><span class="player-name" id="name-DH">--</span></div></div></div></div>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // TODO: 貼上您的 Firebase Config
  const firebaseConfig = {
  apiKey: "AIzaSyBDc712j6cY3VoL2YxvTk8rnwqDfcr28UA",
  authDomain: "baseball-scoreboard-294d8.firebaseapp.com",
  databaseURL: "https://baseball-scoreboard-294d8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "baseball-scoreboard-294d8",
  storageBucket: "baseball-scoreboard-294d8.firebasestorage.app",
  messagingSenderId: "179359096477",
  appId: "1:179359096477:web:8188f897371651442e7e74"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dbRef = ref(db);

  const urlParams = new URLSearchParams(window.location.search);
  const gameId = urlParams.get('gameId');
  const targetTeam = urlParams.get('team'); 
  
  if (!gameId || !targetTeam) {
      document.getElementById('team-title').innerText = "錯誤：缺少賽事或隊伍參數";
  } else {
      loadDefensiveLineup();
  }

  async function loadDefensiveLineup() {
      const basePath = `games/${gameId}`;
      const snapshot = await get(child(dbRef, basePath));
      
      if (!snapshot.exists()) return;
      const data = snapshot.val();
      
      const teamName = data.teams?.[targetTeam]?.name || "未命名隊伍";
      document.getElementById('team-title').innerText = `${teamName} - 先發守備陣容`;

      const rosterData = data.rosters?.[targetTeam] || {};
      const lineupData = data.lineups?.[targetTeam] || {};
      const defPositions = { 'P': null, 'C': null, '1B': null, '2B': null, '3B': null, 'SS': null, 'LF': null, 'CF': null, 'RF': null, 'DH': null };

      if (lineupData.pitcherIndex !== undefined && lineupData.pitcherIndex !== -1) {
          defPositions['P'] = rosterData[lineupData.pitcherIndex];
      }

      const batters = lineupData.batters || {};
      for (let i = 0; i < 9; i++) {
          let b = batters[i];
          if (b && b.rosterIndex !== -1 && b.pos) {
              if (defPositions.hasOwnProperty(b.pos)) {
                  defPositions[b.pos] = rosterData[b.rosterIndex];
              }
          }
      }

      const positionKeys = Object.keys(defPositions);
      positionKeys.forEach(pos => {
          const wrapperEl = document.getElementById(`wrap-${pos}`);
          const numEl = document.getElementById(`num-${pos}`);
          const nameEl = document.getElementById(`name-${pos}`);
          
          if (defPositions[pos]) {
              numEl.innerText = defPositions[pos].num || "";
              nameEl.innerText = defPositions[pos].name || "--";
              wrapperEl.classList.add('animate-pop');
          } else {
              wrapperEl.style.display = 'none';
          }
      });
  }

  // ✅ 2. 核心縮放引擎：加入邊界緩衝區防裁切
  function applyScale() {
      const wrapper = document.getElementById('scale-wrapper');
      
      // 故意在數學計算上，把原本的 1280x720「加碼」160px
      // 這樣等於強迫系統在上下左右各留出 80px 的「隱形防護罩邊界」
      const paddingOffset = 160; 
      const targetW = 1280 + paddingOffset;
      const targetH = 720 + paddingOffset;
      
      const winW = window.innerWidth;
      const winH = window.innerHeight;
      
      // 取得完美的等比例縮放值
      const scale = Math.min(winW / targetW, winH / targetH);
      wrapper.style.transform = `scale(${scale})`;
      
      // 置中對齊，確保畫布周圍留下我們設定的防護邊距
      const xOffset = (winW - 1280 * scale) / 2;
      const yOffset = (winH - 720 * scale) / 2;
      wrapper.style.left = `${Math.max(0, xOffset)}px`;
      wrapper.style.top = `${Math.max(0, yOffset)}px`;
  }
  
  window.addEventListener('resize', applyScale);
  // 初始化載入時執行一次
  applyScale();
  // 避免字型或圖片晚讀取造成尺寸偏移，定期補償
  setInterval(applyScale, 500);
</script>
</body>
</html>
