<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Score Overlay - 動態局數對齊版</title>
    <style>
        body {
            margin: 0;
            overflow: visible;
            background: transparent;
            display: inline-block;
            width: fit-content;
            height: fit-content;
            font-family:
                "Microsoft JhengHei",
                "微軟正黑體",
                sans-serif;
            font-weight: bold;
        }
            /* ===== OBS 模式 ===== */
            body.obs-mode {
                display: inline-block;
            }

            /* ===== Preview 模式 ===== */
            body.preview-mode {

                width: auto;
                height: auto;

                display: inline-block;
            }

        #final-container {
            position: relative;
            display: inline-flex;
            flex-direction: column;
            width: max-content;
            margin: 0;
        }

        /* ========================================== */
        /* 第一段動畫：標題進場 (寬度對齊隊伍欄) */
        /* ========================================== */
        .final-header {

            position: relative;
            background:
                linear-gradient(
                    135deg,
                #14002a 0%,
                #1a1f68 45%,
                #0d103a 100%
            );
            color: #ffe600;
            font-size: 34px;
            font-weight: 1000;
            padding: 16px 0;
            text-align: center;
            width: 100%;
           box-sizing: border-box;
            border:
                2px solid #8f5bff;
           border-bottom:
                4px solid #ffffff;
            letter-spacing: 4px;
           text-shadow:
               0 0 10px rgba(255,255,0,0.8),
               0 0 25px rgba(255,255,0,0.5);
           box-shadow:
               0 0 12px rgba(120,80,255,0.6),
                inset 0 0 20px rgba(255,255,255,0.05);
           overflow: hidden;
            clip-path:
               polygon(
                   16px 0,
                   calc(100% - 16px) 0,
                   100% 16px,
                    100% calc(100% - 16px),
                  calc(100% - 16px) 100%,
                  16px 100%,
                   0 calc(100% - 16px),
                   0 16px
               );

    opacity: 0;
    transform: translateY(-50px);
    animation:
        stage1_in 0.6s forwards,
        evaPulse 4s infinite alternate;
        }

        @keyframes stage1_in {
            to { opacity: 1; transform: translateY(0); }
        }
        .final-header::before {

    content: "";

    position: absolute;

    top: 0;
    left: -120%;

    width: 80%;
    height: 100%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,0.25),
            transparent
        );

    transform: skewX(-25deg);

    animation:
        evaScan 5s infinite;
}

@keyframes evaScan {

    0% {
        left: -120%;
    }

    100% {
        left: 150%;
    }
}

@keyframes evaPulse {

    0% {
        box-shadow:
            0 0 12px rgba(120,80,255,0.5);
    }

    100% {
        box-shadow:
            0 0 24px rgba(180,120,255,0.9);
    }
}

        /* ========================================== */
        /* 第二段動畫：表格背景進場 */
        /* ========================================== */
        /* ========================================== */
        /* Grid Overlay Engine */
        /* ========================================== */

        .score-grid {
            display: grid;
            grid-auto-rows: 60px;
            gap: 3px;
            margin-top: 5px;
            filter:
                drop-shadow(
                    0 5px 15px rgba(0,0,0,0.5)
            );
        }
        .score-grid::after {
            content: "";
           position: absolute;
           inset: 0;
           background:
               repeating-linear-gradient(
                   to bottom,
                   rgba(255,255,255,0.03) 0px,
                  rgba(255,255,255,0.03) 1px,
                 transparent 2px,
                 transparent 4px
               );
            pointer-events: none;
           mix-blend-mode: overlay;
        }
        .score-cell {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
            linear-gradient(
               135deg,
               rgba(10,10,18,0.92),
               rgba(0,0,0,0.96)
            );

border:
    1px solid rgba(120,120,255,0.08);

box-shadow:
    inset 0 0 8px rgba(255,255,255,0.03);
            color: white;
            font-size: 32px;
            box-sizing: border-box;
        }
        .inning-header-cell {
            font-size: 22px;
            font-weight: 700;
            color: #8b94ad;
            letter-spacing: 1px;
            background:
                rgba(20,20,20,0.92);
        }

        .team-label {
            width: 220px;
            min-width: 220px;
            max-width: 220px;
            height: 60px;
            font-size: 28px;
            text-align: left !important;
            padding-left: 24px !important;
            box-sizing: border-box;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: white;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
           .team-label::after {
               content: "";
               position: absolute;
               right: 10px;
              top: 50%;
              width: 22px;
              height: 3px;
               background:
                   rgba(255,255,255,0.7);
               box-shadow:
                   0 0 8px rgba(255,255,255,0.6);
                transform:
                   translateY(-50%) skewX(-30deg);
           }
        .away-color { background-color: #009EDB !important; }
        .home-color { background-color: #62338A !important; }
        
        .inning-num-header td { 
            background-color: #101451; 
            font-size: 18px; 
            height: 30px; 
            color: #ccc;
        }
        .inning-header-fill {

            background-color:
             #101451 !important;
        }

        .total-cell {

            width: 90px;
            min-width: 90px;
            max-width: 90px;
            height: 60px;
            text-align: center;
            text-shadow:
               0 0 10px rgba(255,255,0,0.7),
               0 0 20px rgba(255,255,0,0.4);
            vertical-align: middle;
            padding: 0;
            font-size: 32px;
            background-color:
                rgba(123, 0, 108, 0.9)
                !important;
            color:
            #FFFF00
            !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .total-header-cell {
            font-size: 33px;
            font-weight: 1000;
            color: #7577eb !important;
            letter-spacing: 2px;
        }

        /* ========================================== */
        /* 第三段動畫：數值彈出 */
        /* ========================================== */
        .score-val {
            display: inline-block;
            line-height: 60px;
            font-size: inherit;
            font-weight: bold;
            opacity: 0;
            transform: scale(0);
            animation: stage3_pop 0.4s forwards cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }

        @keyframes stage3_pop {
            to { opacity: 1; transform: scale(1); }
        }

        /* 延遲設定 */
        .delay-1 { animation-delay: 1.1s; } .delay-2 { animation-delay: 1.2s; }
        .delay-3 { animation-delay: 1.3s; } .delay-4 { animation-delay: 1.4s; }
        .delay-5 { animation-delay: 1.5s; } .delay-6 { animation-delay: 1.6s; }
        .delay-7 { animation-delay: 1.7s; } .delay-8 { animation-delay: 1.8s; }
        .delay-9 { animation-delay: 1.9s; }
        .delay-R { animation-delay: 2.2s; }
        .delay-H { animation-delay: 2.3s; }

    </style>
    <link
        id="theme-css"
        rel="stylesheet"
        href=""
    >
</head>
<body id="overlay-body">

<div
    id="final-container"
    class="
        final-theme-container
        preview-scale-root
    "
    style="
        width:max-content;
    ">

    <div
        class="final-header final-theme-header">FINAL SCORE</div>
    <div
    id="box-score"
    class="
        score-grid
        final-theme-grid
    ">
    </div>
</div>

<script type="module">
    import { db } from "./firebase.js";
    import { ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const urlParams =
        new URLSearchParams(
            location.search
        );

    const gameId =
        urlParams.get("gameId");

    function applyTheme(theme){

    document.getElementById(
        "theme-css"
    ).href =
        `themes/${theme}.css`;

    document.getElementById(
        "overlay-body"
    ).className =
        `theme-${theme}`;
    }

        // ===== Preview / OBS mode =====
        if (window.self !== window.top) {

            // iframe preview mode
            document.body.classList.add(
                'preview-mode'
            );

        } else {

            // OBS browser source mode
            document.body.classList.add(
            'obs-mode'
            );
        }
            const basePath = gameId ? `games/${gameId}` : "scoreboard";

    onValue(ref(db, basePath), (snap) => {

        const data = snap.val();
            window.currentGameData = data;
            if (!data) return;
            applyTheme(
                data.theme || "default"
        );

        const currentInning = data.gameInfo?.inning || 1;
        const isTop = data.gameInfo?.isTop ?? true;
        const isGameEnd =
                data.gameInfo?.isGameEnd || false;

        // 計算安打
        const getHits = (team) => {
            const roster = data.rosters?.[team] || [];
            return Object.values(roster).reduce((sum, p) => sum + (p.H || 0), 0);
        };

        // 決定要顯示到第幾局 (根據當前局數動態決定)
        const maxInningToShow = currentInning; 

        // 判定哪些格子要有數字
        // ===== 客隊局數 =====
let awayCompleteCount =
    currentInning - 1;

// 上半局進行中
if (isTop) {

    awayCompleteCount =
        currentInning;
}

// FINAL X 狀態
if (
    isGameEnd &&
    isTop
) {

    awayCompleteCount =
        currentInning;
}

        // ⭐ 修正 FINAL X
        // ===== 主隊局數 =====
let homeCompleteCount =
    currentInning - 1;

// 下半局進行中
if (!isTop) {

    homeCompleteCount =
        currentInning;
}

// FINAL X
if (
    isGameEnd &&
    isTop &&
    data.teams?.home?.score >
    data.teams?.away?.score
) {

    homeCompleteCount =
        currentInning;
}

        const table = document.getElementById('box-score');
        
        // 生成局數標題列
        let inningHeaders = "";
        for (let i = 1; i <= maxInningToShow; i++) {
            inningHeaders += `<td>${i}</td>`;
        }

        const totalCols =
    1 + maxInningToShow + 2;

table.style.gridTemplateColumns =
    `
    220px
    repeat(${maxInningToShow}, 68px)
    90px
    90px
    `;

// ===== Header =====
let html = `
    <div class="
        score-cell
        inning-header-fill
    "></div>
`;

for (let i = 1; i <= maxInningToShow; i++) {

    html += `
    <div class="
        score-cell
        inning-header-cell
    ">
        ${i}
    </div>
`;
}

html += `
    <div class="
        score-cell
        total-cell
        total-header-cell
    ">
        R
    </div>

    <div class="
        score-cell
        total-cell
        total-header-cell
    ">
        H
    </div>
`;

// ===== Away =====
html += `
    <div class="
        team-label
        away-color
        final-team-label
    ">
        ${data.teams?.away?.name || '客隊'}
    </div>
`;

html += renderGridScores(
    data.inningScores?.away,
    awayCompleteCount,
    maxInningToShow,
    isGameEnd,
    "away"
);

html += `
    <div class="
        total-cell
        final-total-cell
    ">
        <span class="
            score-val
            delay-R
        ">
            ${data.teams?.away?.score || 0}
        </span>
    </div>

    <div class="
        total-cell
        final-total-cell
    ">
        <span class="
            score-val
            delay-H
        ">
            ${getHits('away')}
        </span>
    </div>
`;

// ===== Home =====
html += `
    <div class="
        team-label
        home-color
        final-team-label
    ">
        ${data.teams?.home?.name || '主隊'}
    </div>
`;

html += renderGridScores(
    data.inningScores?.home,
    homeCompleteCount,
    maxInningToShow,
    isGameEnd,
    "home"
);

html += `
    <div class="
        total-cell
        final-total-cell
    ">
        <span class="
            score-val
            delay-R
        ">
            ${data.teams?.home?.score || 0}
        </span>
    </div>

    <div class="
        total-cell
        final-total-cell
    ">
        <span class="
            score-val
            delay-H
        ">
            ${getHits('home')}
        </span>
    </div>
`;

table.innerHTML = html;
    });

    function renderGridScores(
    scores,
    completeCount,
    maxInning,
    isGameEnd,
    teamType
    )
{

    let cells = "";

    for (
        let i = 1;
        i <= maxInning;
        i++
    ) {

        let val = "";
            if (i <= completeCount) {
            
            // ===== FINAL X 規則 =====
        const awayScore =
            window.currentGameData
            ?.teams?.away?.score || 0;

        const homeScore =
            window.currentGameData
            ?.teams?.home?.score || 0;

        const currentInning =
            window.currentGameData
            ?.gameInfo?.inning || 1;

        const isTop =
            window.currentGameData
           ?.gameInfo?.isTop ?? true;

        // FINAL 主隊不用打下半 → 顯示 X
        if (
            teamType === "home" &&
            isGameEnd &&
            isTop &&
            homeScore > awayScore &&
            i === currentInning
        ) {
            val = "X";
        } else {
            val = scores?.[i] ?? 0;
        }
            }

        cells += `
            <div class="
                score-cell
                inning-cell
            ">
                <span class="
                    score-val
                    delay-${i}
                ">
                    ${val}
                </span>
            </div>
        `;
    }

    return cells;
}
</script>

</body>
</html>
